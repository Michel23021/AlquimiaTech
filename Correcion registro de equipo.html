<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Equipo | AlquimiaTech</title>
    <style>
        :root {
            --bg-space: #05070a;
            --primary-purple: #7000ff;
            --deep-blue: #1a2a6c;
            --silver: #e2e2e2;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1a2a6c 0%, #05070a 70%, #301934 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--silver);
            padding: 20px;
        }

        .device-card {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 40px rgba(112, 0, 255, 0.25);
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section span { color: var(--gold); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; display: block; }
        .header-section h1 {
            margin: 10px 0; font-weight: 800; letter-spacing: 2px; font-size: 1.8rem;
            background: linear-gradient(to right, var(--silver), var(--gold), var(--silver));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .divider { height: 2px; width: 60px; background: var(--gold); margin: 15px auto; box-shadow: 0 0 10px var(--gold-glow); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; text-align: start; }
        .full-width { grid-column: span 2; }

        label { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; display: block; }

        input, select, textarea {
            width: 100%; padding: 12px;
            background: rgba(86, 6, 105, 0.2);
            border: 1px solid rgba(112, 0, 255, 0.3);
            border-radius: 8px; color: var(--silver);
            font-size: 0.95rem; transition: 0.3s; box-sizing: border-box;
        }

        select option { background: #1a1a1a; }

        input:focus, select:focus, textarea:focus { 
            outline: none; border-color: var(--gold); 
            background: rgba(112, 0, 255, 0.1); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); 
        }

        .btn-link {
            width: 100%; padding: 16px;
            background: linear-gradient(45deg, var(--deep-blue), var(--primary-purple));
            color: white; border: 1px solid var(--gold);
            border-radius: 8px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.4s; margin-top: 10px;
        }

        .btn-link:hover { transform: scale(1.01); box-shadow: 0 0 25px rgba(112, 0, 255, 0.5); }

        @media (max-width: 650px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="device-card">
    <div class="header-section">
        <span>Vinculación de Hardware</span>
        <h1>REGISTRO DE EQUIPO</h1>
        <div class="divider"></div>
    </div>

    <form>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Propietario del Sistema</label>
                <select name="id_usuario" required>
                    <option value="">Seleccione el cliente registrado...</option>
                    <option value="1"> Usuario(ID: 000)</option>
                </select>
            </div>

            <div class="form-group">
               <label>Tipo de Dispositivo</label>
               <select name="tipo" required>
                   <option value="">Seleccione el tipo de dispositivo</option>
                   <option value="laptop">Laptop / Portátil</option>
                   <option value="desktop">PC Escritorio</option>
                   <option value="server">Servidor</option>
                   <option value="mobile">Teléfono / Tablet</option>
                   <option value="wearable">Reloj inteligente / Wearable </option>
                   <option value="console">Consola de Videojuegos</option>
                   <option value="smart_tv">Smart TV / Streaming</option>
                   <option value="printer">Impresora / Escaner </option>
                   <option value="monitorr">Monitor / pantalla </option>
                </select>
            </div>

            <div class="form-group">
                <label>Número de Serie (S/N)</label>
                <input type="text" name="serial" placeholder="Ex: SN-9920X-LP" required>
            </div>

            <div class="form-group">
                <label>Marca</label>
                <input type="text" name="marca" placeholder="Ej: ASUS, Dell, Apple" required>
            </div>

            <div class="form-group">
                <label>Modelo</label>
                <input type="text" name="modelo" placeholder="Ej: Rog Strix G15" required>
            </div>

            <div class="form-group full-width">
                <label>Especificaciones Técnicas (Opcional)</label>
                <textarea name="specs" rows="2" placeholder="Procesador, RAM, Almacenamiento, etc..."></textarea>
            </div>
        </div>

        <button type="submit" class="btn-link">Vincular y Abrir Ticket</button>
    </form>
</div>

</body>
</html>
