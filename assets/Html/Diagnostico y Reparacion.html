<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Técnico | Alquimia Tech</title>
    <style>
        :root {
            --bg-space: #05070a;
            --primary-purple: #7000ff;
            --deep-blue: #1a2a6c;
            --silver: #e2e2e2;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1a2a6c 0%, #05070a 70%, #301934 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--silver);
            padding: 20px;
        }

        .diag-card {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 40px rgba(112, 0, 255, 0.25);
            width: 100%;
            max-width: 700px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section span { color: var(--gold); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; display: block; }
        .header-section h1 {
            margin: 10px 0; font-weight: 800; letter-spacing: 2px; font-size: 1.8rem;
            background: linear-gradient(to right, var(--silver), var(--gold), var(--silver));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .divider { height: 2px; width: 60px; background: var(--gold); margin: 15px auto; box-shadow: 0 0 10px var(--gold-glow); }

        /* Estilo del Ticket automático */
        .info-ticket {
            background: var(--gold);
            color: black;
            font-weight: 800;
            font-size: 0.8rem; /* Un poco más grande para que se vea */
            padding: 6px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; text-align: start; }
        .full-width { grid-column: span 2; }

        label { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; display: block; font-weight: bold; }

        input, select, textarea {
            width: 100%; padding: 12px;
            background: rgba(86, 6, 105, 0.2);
            border: 1px solid rgba(112, 0, 255, 0.3);
            border-radius: 8px; color: #ffffff; /* Letra blanca pura para que se vea */
            font-size: 1.1rem; /* LETRA MÁS GRANDE */
            transition: 0.3s; box-sizing: border-box;
        }

        select option { background: #1a1a1a; }

        input:focus, select:focus, textarea:focus { 
            outline: none; border-color: var(--gold); 
            background: rgba(112, 0, 255, 0.1); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); 
        }

        .repuestos-lista {
            background: rgba(112, 0, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(112, 0, 255, 0.2);
        }

        .btn-update {
            width: 100%; padding: 16px;
            background: linear-gradient(45deg, var(--deep-blue), var(--primary-purple));
            color: white; border: 1px solid var(--gold);
            border-radius: 8px; font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.4s; margin-top: 10px;
        }

        .btn-update:hover { transform: scale(1.01); box-shadow: 0 0 25px rgba(112, 0, 255, 0.5); }

        @media (max-width: 650px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="diag-card">
    <div class="header-section">
        <div class="info-ticket" id="ticket-auto">TICKET #----</div>
        <h1>BITÁCORA TÉCNICA</h1>
        <div class="divider"></div>
    </div>

    <form>
        <div class="form-grid">
            <div class="form-group">
                <label>Estado de la Operación</label>
                <select name="nuevo_estado">
                    <option value="diag">En Diagnóstico</option>
                    <option value="rep">En Reparación</option>
                    <option value="part">Esperando Repuesto</option>
                    <option value="done">Control de Calidad (Listo)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nivel de Complejidad</label>
                <select name="complejidad">
                    <option value="1">Básica (Software/Limpieza)</option>
                    <option value="2">Media (Cambio de Partes)</option>
                    <option value="3">Avanzada (Micro-soldadura)</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Hallazgos Técnicos</label>
                <textarea name="diagnostico" rows="3" placeholder="Ej: Se detecta sulfatación en el área del IC de carga..."></textarea>
            </div>

            <div class="form-group full-width">
                <label>Acciones Realizadas</label>
                <textarea name="acciones" rows="3" placeholder="Ej: Re-soldadura de pines y cambio de pasta térmica..."></textarea>
            </div>

            <div class="form-group full-width">
                <label>Insumos y Repuestos (Precios Reales COP)</label>
                <div class="repuestos-lista">
                    <select name="repuestos_id">
                        <option value="">Seleccionar del Inventario...</option>
                        <option value="1">SSD Kingston 480GB ($219.900)</option>
                        <option value="2">Pantalla Original iPhone 11 ($280.000)</option>
                        <option value="3">Pasta Térmica MX-6 ($60.000)</option>
                        <option value="4">SSD 1TB NVMe ($420.000)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Costo Mano de Obra ($)</label>
                <input type="number" name="mano_obra" placeholder="Ej: 120000">
            </div>

            <div class="form-group">
                <label>Fecha Estimada</label>
                <input type="date" name="fecha_entrega">
            </div>
        </div>

        <button type="submit" class="btn-update">Actualizar Línea de Vida</button>
    </form>
</div>

<script>
    // Generador de ticket automático al cargar la página
    window.onload = function() {
        const fecha = new Date();
        const año = fecha.getFullYear().toString().slice(-2);
        const mes = (fecha.getMonth() + 1).toString().padStart(2, '0');
        const random = Math.floor(1000 + Math.random() * 9000);
        
        const ticketFinal = `ALQ-${año}${mes}-${random}`;
        document.getElementById('ticket-auto').innerText = `TICKET: ${ticketFinal}`;
    };
</script>

</body>
</html>
