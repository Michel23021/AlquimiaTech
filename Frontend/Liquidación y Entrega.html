<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidación Final | Alquimia Tech</title>
    <style>
        :root {
            --bg-space: #05070a;
            --primary-purple: #7000ff;
            --deep-blue: #1a2a6c;
            --silver: #e2e2e2;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1a2a6c 0%, #05070a 70%, #301934 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--silver);
            padding: 20px;
        }

        .checkout-card {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 40px rgba(112, 0, 255, 0.25);
            width: 100%;
            max-width: 500px;
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section span { color: var(--gold); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; display: block; }
        .header-section h1 {
            margin: 10px 0; font-weight: 800; letter-spacing: 2px; font-size: 1.8rem;
            background: linear-gradient(to right, var(--silver), var(--gold), var(--silver));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .divider { height: 2px; width: 60px; background: var(--gold); margin: 15px auto; box-shadow: 0 0 10px var(--gold-glow); }

        .invoice-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(112, 0, 255, 0.2);
        }

        .invoice-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .invoice-total { 
            display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; 
            border-top: 1px solid var(--gold); color: var(--gold); font-weight: 800; font-size: 1.2rem; 
        }

        .form-group { margin-bottom: 20px; text-align: start; }
        label { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; display: block; }

        select, input {
            width: 100%; padding: 12px;
            background: rgba(86, 6, 105, 0.2);
            border: 1px solid rgba(112, 0, 255, 0.3);
            border-radius: 8px; color: var(--silver);
            font-size: 0.95rem; transition: 0.3s; box-sizing: border-box;
        }

        input:focus, select:focus { 
            outline: none; border-color: var(--gold); 
            background: rgba(112, 0, 255, 0.1); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); 
        }

        .btn-finish {
            width: 100%; padding: 16px;
            background: linear-gradient(45deg, var(--deep-blue), var(--primary-purple));
            color: white; border: 1px solid var(--gold);
            border-radius: 8px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.4s; margin-top: 10px;
        }

        .btn-finish:hover { transform: scale(1.01); box-shadow: 0 0 25px rgba(112, 0, 255, 0.5); }

        .seal {
            position: absolute; top: -15px; right: -15px; width: 70px; height: 70px;
            background: var(--gold); color: black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 0.55rem; font-weight: 800;
            transform: rotate(15deg); border: 3px double black; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="checkout-card">
    <div class="seal">CALIDAD<br>ALQUIMIA<br>CERTIFICADA</div>
    
    <div class="header-section">
        <span>Finalización de Servicio</span>
        <h1>ORDEN DE SALIDA</h1>
        <div class="divider"></div>
    </div>

    <div class="invoice-box">
        <div class="invoice-item">
            <span>Mano de Obra Técnica</span>
            <span>$ 120.000</span>
        </div>
        <div class="invoice-item">
            <span>Repuestos (SSD 480GB)</span>
            <span>$ 180.000</span>
        </div>
        <div class="invoice-item">
            <span>Consumo Alquimia Cafe</span>
            <span>$ 15.500</span>
        </div>
        <div class="invoice-total">
            <span>TOTAL A PAGAR</span>
            <span>$ 315.500</span>
        </div>
    </div>

    <form>
        <div class="form-group">
            <label>Método de Pago</label>
            <select name="metodo_pago">
                <option value="efectivo">Efectivo</option>
                <option value="transferencia">Transferencia (Nequi/Daviplata)</option>
                <option value="tarjeta">Tarjeta de Crédito/Débito</option>
                <option value="cripto">Activos Digitales</option>
            </select>
        </div>

        <div class="form-group">
            <label>Días de Garantía Otorgados</label>
            <input type="number" name="garantia" value="90">
        </div>

        <div class="form-group">
            <label>Observaciones de Entrega</label>
            <input type="text" name="obs_entrega" placeholder="Ej: Se entrega con sello de seguridad #001">
        </div>

        <button type="submit" class="btn-finish">CERRAR PROTOCOLO Y ENTREGAR</button>
    </form>
</div>

</body>
</html>
