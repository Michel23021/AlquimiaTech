<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquimia Tech | Gestión de Tickets</title>
    <style>
        :root {
            --bg-space: #05070a;
            --primary-purple: #7000ff;
            --deep-blue: #1a2a6c;
            --silver: #e2e2e2;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1a2a6c 0%, #05070a 70%, #301934 100%);
            min-block-size: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--silver);
            padding: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            inline-size: 100%;
            max-inline-size: 750px; /* Un poco más ancho para los detalles del ticket */
            box-sizing: border-box;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { text-align: center; margin-block-end: 30px; }
        .header-section span { color: var(--gold); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; display: block; }
        .header-section h1 {
            margin: 10px 0; font-weight: 800; letter-spacing: 2px; font-size: 1.6rem;
            background: linear-gradient(to right, var(--silver), var(--gold), var(--silver));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .divider { block-size: 2px; inline-size: 60px; background: var(--gold); margin: 15px auto; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-block-end: 15px; text-align: start; }
        .full-width { grid-column: span 2; }

        label { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1.2px; margin-block-end: 8px; display: block; }

        input, select, textarea {
            inline-size: 100%; padding: 12px;
            background: rgba(39, 37, 37, 0.986);
            border: 1px solid rgba(112, 0, 255, 0.3);
            border-radius: 8px; color: var(--silver);
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--gold);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .btn-main {
            inline-size: 100%; padding: 16px;
            background: linear-gradient(45deg, var(--deep-blue), var(--primary-purple));
            color: white; border: 1px solid var(--gold);
            border-radius: 8px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; margin-block-start: 20px;
            transition: 0.3s ease;
        }

        .btn-main:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        @media (max-inline-size: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-section">
        <span>Soporte Técnico</span>
        <h1>NUEVO TICKET</h1>
        <div class="divider"></div>
    </div>

    <form action="#" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Número de Ticket</label>
                <input type="number" name="numeroTicket" placeholder="Ej: 0045" required>
            </div>
            
            <div class="form-group">
                <label>Fecha de Ingreso</label>
                <input type="datetime-local" name="fecha_ingreso" required>
            </div>

            <div class="form-group full-width">
                <label>Equipo Asociado (Serial/Modelo)</label>
                <select name="Equipo_idEquipo" required>
                    <option value="" disabled selected>Seleccione el equipo...</option>
                    <option value="1">Laptop Asus - SN: 45678</option>
                    <option value="2">PC Oficina - SN: 12345</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tipo de Servicio</label>
                <select name="Tipo_Servicios_idTipo_Servicios">
                    <option value="1">Mantenimiento</option>
                    <option value="2">Reparación</option>
                    <option value="3">Garantía</option>
                </select>
            </div>

            <div class="form-group">
                <label>Técnico Responsable</label>
                <select name="Tecnicos_idTecnicos">
                    <option value="">Asignar técnico...</option>
                    </select>
            </div>

            <div class="form-group full-width">
                <label>Descripción del Problema</label>
                <textarea name="descripcion_servicio" rows="4" placeholder="Describa los síntomas del equipo..."></textarea>
            </div>

            <div class="form-group">
                <label>Precio del Servicio (COP)</label>
                <input type="number" step="0.01" name="precio_Servicio" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>Estado del Equipo</label>
                <select name="Estados_equipos_idEstoa_equipos">
                    <option value="1">Recibido</option>
                    <option value="2">En Revisión</option>
                    <option value="3">Reparado</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-main">Generar Protocolo de Ticket</button>
    </form>
</div>

</body>
</html>
